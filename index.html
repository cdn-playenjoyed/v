
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch on Videy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:#f3f4f6;
  color:#111;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ===== HEADER ===== */
header{
  border-bottom:1px solid #e5e7eb;
  background:#fff;
}
.header-container{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:14px;
}
.logo{
  font-size:24px;
  font-weight:700;
}
.upload-btn{
  text-decoration:none;
  background:#f3f4f6;
  padding:8px 16px;
  border-radius:20px;
  color:#111;
  font-weight:600;
  font-size:14px;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 15px;
}

/* ===== VIDEO BOX ===== */
.video-wrapper{
  width:800px;
  max-width:95vw;
  aspect-ratio:16/9;
  background:#000;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ===== BUTTON ===== */
.actions{
  margin-top:25px;
}

.cta-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:14px 28px;
  border-radius:28px;
  background:linear-gradient(90deg,#667eea,#764ba2);
  color:#fff;
  text-decoration:none;
  font-weight:600;
  font-size:16px;
  box-shadow:0 6px 18px rgba(102,126,234,.35);
  transition:.2s;
}

.cta-btn:hover{
  transform:translateY(-2px);
}

footer{
  text-align:center;
  padding:20px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body oncontextmenu="return false">

<header>
  <div class="header-container">
    <div class="logo">Videy</div>
    <a href="#" class="upload-btn">Upload</a>
  </div>
</header>

<div class="main">

  <div class="video-wrapper">
    <video id="video"
  muted
  playsinline
  controls
  controlsList="nodownload noplaybackrate">
</video>
  </div>
</div>

<footer>
© 2026 Videy
</footer>

<script>
const video = document.getElementById("video");

// ambil ?id=
const params = new URLSearchParams(window.location.search);
const VIDEO_ID = params.get("id");

if(VIDEO_ID){
  let base = "https://cdn.videy.co/" + VIDEO_ID;

  function loadVideo(src){
    video.src = src;
    video.load();
  }

  loadVideo(base + ".mp4");

  video.onerror = () => {
    if(!video.dataset.mov){
      video.dataset.mov = 1;
      loadVideo(base + ".mov");
    }
  };

}else{
  document.querySelector(".main").innerHTML =
    "<h2>Video not found</h2>";
}
</script>
