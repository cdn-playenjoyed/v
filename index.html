<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Player</title>

  <style>
    /* CSS Klasik / Tradisional */
    body, html {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
    }

    .video-box {
      width: 100%;
      max-width: 720px;
      padding: 15px;
      box-sizing: border-box;
    }

    #video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background-color: #1a1a1a;
      border-radius: 5px;
      overflow: hidden;
    }

    #video-el {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #clickInterceptor {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      cursor: pointer;
    }

    .ad-container {
      text-align: center;
      margin-top: 15px;
      z-index: 10;
      position: relative;
    }

    #ad-link {
      color: #60a5fa;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    #ad-link:hover {
      color: #93c5fd;
    }

    /* Default disembunyikan sampai JS memvalidasi ID */
    #content, #not-found {
      display: none;
    }

    #not-found h1 {
      font-size: 24px;
    }
  </style>
</head>
<body>

  <div id="content" class="container">
    <div class="video-box">
      
      <div id="video-wrapper">
        <div id="clickInterceptor"></div>
        <video id="video-el" controls playsinline controlsList="nodownload"></video>
      </div>

      <div class="ad-container">
        <a id="ad-link" href="https://latherachelesscatastrophe.com/hum10np01?key=5c98931b4996e746fda3790c78e2adca" target="_blank" rel="noopener noreferrer">
          Continue to see more
        </a>
      </div>

    </div>
  </div>

  <div id="not-found" class="container">
      <h1>Video tidak ditemukan</h1>
  </div>

  <script>
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      let rawId = urlParams.get("id");

      if (!rawId && window.location.search.length > 1) {
        const searchRaw = window.location.search.substring(1);
        if (!searchRaw.includes("=")) { rawId = searchRaw; }
      }
      
      if (!rawId && window.location.hash.length > 1) {
          rawId = window.location.hash.substring(1);
      }

      let finalId = "";
      if (rawId) {
        let cleanId = rawId.replace(/\.[a-zA-Z0-9]+$/, "");
        if (cleanId === "v") cleanId = "";
        finalId = cleanId.replace(/[^a-zA-Z0-9_-]/g, "");
      }

      const contentDiv = document.getElementById("content");
      const notFoundDiv = document.getElementById("not-found");
      const videoEl = document.getElementById("video-el");
      const interceptor = document.getElementById("clickInterceptor");
      const adLink = document.getElementById("ad-link");

      const smartlink = "https://latherachelesscatastrophe.com/hum10np01?key=5c98931b4996e746fda3790c78e2adca";
      const cdnBase = "https://cdn.videy.co";

      if (finalId) {
        contentDiv.style.display = "flex";
        document.title = `${finalId}.mp4`;
        videoEl.src = `${cdnBase}/${finalId}.mp4`;

        let popped = false;

        function firePopunder(e) {
          if (popped) return;
          popped = true;
          
          if (e && e.target !== adLink) e.preventDefault();

          const a = document.createElement("a");
          a.href = smartlink;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          if (interceptor) interceptor.remove(); 

          if (videoEl && videoEl.paused && e.target !== adLink) {
            videoEl.play().catch(() => {});
          }
        }

        if (interceptor) interceptor.addEventListener("click", firePopunder);
        
        if (adLink) {
          adLink.addEventListener("click", () => {
            if (interceptor) interceptor.remove();
          });
        }

        if (videoEl) {
          videoEl.addEventListener('ended', function() {
            window.location.replace(smartlink);
          });
        }
      } else {
        notFoundDiv.style.display = "flex";
      }
    })();
  </script>
